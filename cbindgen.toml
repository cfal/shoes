language = "C"
header = """/**
 * @file shoes.h
 * @brief C interface for the shoes proxy library (auto-generated by cbindgen).
 *
 * Provides C-compatible functions for embedding the shoes VPN/proxy engine
 * into iOS applications via Swift or Objective-C.
 */"""
include_guard = "SHOES_H"
no_includes = true
sys_includes = ["stdbool.h", "stdint.h"]

[export]
include = ["ProtectSocketCallback"]
exclude = ["Address", "AddressMask", "NetLocationMask"]
item_types = ["functions", "typedefs"]

[fn]
sort_by = "None"

# Suppress internal pub const → #define leaking.
[const]
allow_static_const = false

[defines]
"target_os = \"ios\"" = ""
"target_os = \"android\"" = ""
"feature = \"ffi\"" = ""
